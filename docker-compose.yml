services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: adiyogi
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/adiyogi?authSource=admin
      # MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5001
      CLIENT_URL: ${CLIENT_URL}
      SERVER_URL: ${SERVER_URL}
      ADMIN_WHATSAPP: ${ADMIN_WHATSAPP:-}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-true}
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
      IMAGEKIT_PRODUCT_IMAGES_FOLDER: ${IMAGEKIT_PRODUCT_IMAGES_FOLDER:-adiyogi-internationals/product-images}
      IMAGEKIT_COLLECTION_IMAGES_FOLDER: ${IMAGEKIT_COLLECTION_IMAGES_FOLDER:-adiyogi-internationals/collection-images}
      IMAGEKIT_INVOICES_FOLDER: ${IMAGEKIT_INVOICES_FOLDER:-adiyogi-internationals/invoices}
    volumes:
      - wa-auth:/app/wa_auth
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
    driver: local
  wa-auth:
    driver: local
